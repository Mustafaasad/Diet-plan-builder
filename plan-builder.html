<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Coach Mustafa — Plan Builder</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  :root{
    --ink:#0e2a33;--teal:#1f4e5f;--teal-2:#2f6c80;--mist:#eef3f4;--line:#d9e2e4;
    --amber:#e8821e;--amber-soft:#fbe9d3;--amber-ink:#9a4e0c;--good:#2f8f5b;--over:#c0492f;
    --paper:#f6f9f9;--white:#fff;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;background:var(--paper);
    color:var(--ink);line-height:1.45;font-size:15px}
  .wrap{max-width:560px;margin:0 auto;padding:14px 14px 110px}
  .hidden{display:none!important}
  h2{font-size:12px;text-transform:uppercase;letter-spacing:.9px;color:var(--teal-2);
    margin-bottom:10px;display:flex;align-items:center;gap:8px}
  h2::before{content:"";width:16px;height:2px;background:var(--amber);border-radius:2px}
  .panel{background:var(--white);border:1px solid var(--line);border-radius:14px;padding:14px;margin-top:13px}
  .tip{font-size:11.5px;color:#7e9197;margin-top:7px}

  .topbar{background:var(--teal);color:#fff;border-radius:16px;padding:15px 16px;
    box-shadow:0 6px 18px rgba(15,42,51,.16);display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;letter-spacing:.3px;font-size:17px}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--amber);flex:none}
  .ghost{background:rgba(255,255,255,.16);border:none;color:#fff;border-radius:9px;padding:8px 12px;
    font-size:14px;font-weight:600;cursor:pointer}
  .ghost:hover{background:rgba(255,255,255,.28)}

  .newbtn{width:100%;margin-top:13px;background:var(--amber);color:#fff;border:none;padding:14px;
    border-radius:13px;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 4px 12px rgba(232,130,30,.3)}
  .newbtn:active{transform:translateY(1px)}
  .plan-card{background:var(--white);border:1px solid var(--line);border-radius:13px;padding:13px 14px;
    margin-top:11px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
  .plan-card:active{background:#f0f6f7}
  .plan-card .who{font-weight:700;font-size:16px}
  .plan-card .meta{font-size:12px;color:#7e9197;margin-top:2px}
  .plan-card .kcal{font-weight:800;color:var(--teal);font-size:15px;text-align:right;white-space:nowrap}
  .plan-card .del{background:none;border:none;color:#b14;font-size:20px;cursor:pointer;padding:4px 2px 4px 10px}
  .empty{text-align:center;color:#90a3a8;padding:40px 10px;font-size:14px}

  .field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--teal-2);margin-bottom:4px}
  .field input{width:100%;padding:11px;border-radius:10px;border:1px solid var(--line);font-size:15px;background:#fff}
  .twocol{display:grid;grid-template-columns:1fr 1fr;gap:10px}

  .tgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .tbox{text-align:center}
  .tbox .lab{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--teal-2);margin-bottom:4px}
  .tbox input{width:100%;border:1px solid var(--line);border-radius:9px;text-align:center;font-size:16px;
    font-weight:700;padding:9px 2px;color:var(--teal);background:#fff}

  .pgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .pbox{background:var(--mist);border-radius:12px;padding:11px 12px}
  .pbox .name{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--teal-2);font-weight:600}
  .pbox .used{font-size:20px;font-weight:800;margin-top:3px}
  .pbox .used small{font-size:12px;font-weight:600;color:#7e9197}
  .bar{height:8px;background:#dde6e7;border-radius:5px;margin-top:8px;overflow:hidden}
  .bar>span{display:block;height:100%;background:var(--teal-2);border-radius:5px;transition:width .25s,background .25s}
  .pbox .left{font-size:11px;margin-top:5px;color:var(--teal-2);font-weight:600}
  .pbox .left.over{color:var(--over)}

  .meal{border:1px solid var(--line);border-radius:13px;margin-top:12px;overflow:hidden;background:#fff}
  .meal-head{background:var(--teal);color:#fff;padding:8px 12px;display:flex;align-items:center;justify-content:space-between}
  .meal-head input{font-weight:700;font-size:15px;background:transparent;border:none;color:#fff;width:72%}
  .meal-head input:focus{outline:1px solid rgba(255,255,255,.4);border-radius:5px}
  .iconbtn{background:rgba(255,255,255,.16);border:none;color:#fff;border-radius:8px;width:30px;height:30px;font-size:15px;cursor:pointer}
  .iconbtn:hover{background:rgba(255,255,255,.3)}
  .rows{padding:8px 10px}
  .frow{display:grid;grid-template-columns:1fr 72px auto 26px;gap:7px;align-items:center;padding:5px 0}
  .frow select,.frow input{padding:9px 8px;border:1px solid var(--line);border-radius:9px;font-size:14px;background:#fff;width:100%}
  .qtywrap{display:flex;flex-direction:column;align-items:center}
  .qtywrap .unit{font-size:10px;color:#7e9197;margin-top:2px;font-weight:600;letter-spacing:.3px;min-height:12px}
  .frow .mac{font-size:11px;color:var(--teal-2);text-align:right;line-height:1.2;white-space:nowrap}
  .frow .mac b{color:var(--ink)}
  .rmrow{background:none;border:none;color:#b14;font-size:18px;cursor:pointer;padding:0}
  .add-food{margin:5px 2px 6px;background:var(--amber-soft);color:var(--amber-ink);border:none;padding:9px 13px;border-radius:10px;font-weight:600;font-size:13px;cursor:pointer}
  .add-food:active{background:#f6d6b6}
  .meal-sub{padding:8px 12px;background:var(--mist);font-size:12px;color:var(--teal);display:flex;justify-content:flex-end;gap:13px;font-weight:600}
  .add-meal{width:100%;margin-top:12px;background:#fff;border:1.5px dashed var(--teal-2);color:var(--teal);padding:12px;border-radius:12px;font-weight:700;cursor:pointer;font-size:14px}
  .add-meal:active{background:#eef6f7}

  .actionbar{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.96);
    backdrop-filter:blur(6px);border-top:1px solid var(--line);padding:10px 14px;display:flex;gap:10px;
    max-width:560px;margin:0 auto;z-index:30}
  .actionbar button{flex:1;padding:13px;border-radius:12px;border:none;font-weight:700;font-size:14px;cursor:pointer}
  .btn-save{background:var(--teal);color:#fff}
  .btn-save:active{background:#163b47}
  .btn-pdf{background:#25803a;color:#fff}
  .btn-pdf:active{background:#1c6630}

  .toast{position:fixed;left:50%;bottom:78px;transform:translateX(-50%) translateY(16px);background:var(--ink);
    color:#fff;padding:11px 18px;border-radius:30px;font-size:13px;opacity:0;transition:.3s;pointer-events:none;z-index:60}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="wrap">

  <!-- ============ LIBRARY VIEW ============ -->
  <div id="libView">
    <div class="topbar">
      <div class="brand"><span class="dot"></span> COACH MUSTAFA</div>
    </div>
    <button class="newbtn" onclick="newPlan()">+ New plan</button>
    <h2 style="margin-top:18px">Saved plans</h2>
    <div id="planList"></div>
  </div>

  <!-- ============ EDITOR VIEW ============ -->
  <div id="editView" class="hidden">
    <div class="topbar">
      <button class="ghost" onclick="backToLibrary()">‹ Plans</button>
      <div class="brand" style="font-size:15px"><span class="dot"></span> Plan</div>
    </div>

    <div class="panel">
      <div class="twocol">
        <div class="field"><label>Client</label><input id="client" placeholder="e.g. Ayesha" oninput="markDirty()"></div>
        <div class="field"><label>Goal</label><input id="goal" placeholder="e.g. Fat Loss" oninput="markDirty()"></div>
      </div>
    </div>

    <div class="panel">
      <h2>Set daily targets</h2>
      <div class="tgrid" id="targets"></div>
      <div class="tip">Type the day's goal. Leave 0 if you don't track that one.</div>
    </div>

    <div class="panel">
      <h2>Progress · updates as you add food</h2>
      <div class="pgrid" id="progress"></div>
    </div>

    <div id="meals"></div>
    <button class="add-meal" onclick="addMeal()">+ Add a meal</button>
  </div>

</div>

<div class="actionbar hidden" id="actionbar">
  <button class="btn-save" onclick="savePlan()">Save plan</button>
  <button class="btn-pdf" onclick="exportPDF()">Save as PDF</button>
</div>

<div class="toast" id="toast"></div>

const CAT_ORDER=["Protein","Carb","Fat","Dairy","Fruit","Vegetable","Extras"];
const FOODS = FOODS_RAW.map(f=>({
  name:f[0],cat:f[1],unit:f[2],
  p:f[4]/f[3], c:f[5]/f[3], fat:f[6]/f[3], cal:f[7]/f[3]
})).sort((a,b)=> CAT_ORDER.indexOf(a.cat)-CAT_ORDER.indexOf(b.cat) || a.name.localeCompare(b.name));
const byName = Object.fromEntries(FOODS.map(f=>[f.name,f]));
const MACROS=["Protein","Carbs","Fats","Calories"], MKEY=["p","c","fat","cal"], MUNIT=["g","g","g",""];

/* ====================== STORAGE ====================== */
const HAS_WS = (typeof window!=="undefined") && window.storage && typeof window.storage.set==="function";
const Store = {
  async list(){
    const out=[];
    if(HAS_WS){
      try{ const r=await window.storage.list("plan:"); const keys=(r&&r.keys)||[];
        for(const k of keys){ const key=typeof k==="string"?k:(k.key||k);
          try{ const g=await window.storage.get(key); if(g&&g.value) out.push(JSON.parse(g.value)); }catch(e){} }
      }catch(e){}
    } else {
      try{ for(let i=0;i<localStorage.length;i++){ const key=localStorage.key(i);
        if(key&&key.indexOf("plan:")===0){ try{out.push(JSON.parse(localStorage.getItem(key)))}catch(e){} } } }catch(e){}
    }
    return out.sort((a,b)=>(b.updated||0)-(a.updated||0));
  },
  async save(plan){ const key="plan:"+plan.id, val=JSON.stringify(plan);
    try{ if(HAS_WS) await window.storage.set(key,val); else localStorage.setItem(key,val); return true; }catch(e){ return false; } },
  async remove(id){ const key="plan:"+id;
    try{ if(HAS_WS) await window.storage.delete(key); else localStorage.removeItem(key); }catch(e){} }
};

/* ====================== STATE ====================== */
let plan = null;
let dirty = false;
function blankPlan(){ return { id:"p"+Date.now()+Math.floor(Math.random()*999),
  client:"", goal:"", targets:[0,0,0,0],
  meals:[{name:"Meal 1",items:[{food:"",qty:""}]}], updated:Date.now() }; }

const r1=n=>Math.round(n*10)/10, r0=n=>Math.round(n);
function rowMacros(it){ const f=byName[it.food], q=parseFloat(it.qty)||0; if(!f) return [0,0,0,0];
  return [f.p*q,f.c*q,f.fat*q,f.cal*q]; }
function mealTotals(m){ return m.items.reduce((a,it)=>{const r=rowMacros(it);return a.map((v,i)=>v+r[i])},[0,0,0,0]); }
function dayTotals(){ return plan.meals.reduce((a,m)=>{const t=mealTotals(m);return a.map((v,i)=>v+t[i])},[0,0,0,0]); }

function foodOptions(sel){
  let html='<option value="">— pick food —</option>', cur="";
  FOODS.forEach(f=>{ if(f.cat!==cur){ if(cur)html+="</optgroup>"; html+=`<optgroup label="${f.cat}">`; cur=f.cat; }
    html+=`<option ${f.name===sel?"selected":""}>${f.name}</option>`; });
  return html+"</optgroup>";
}

/* ====================== LIBRARY ====================== */
async function renderLibrary(){
  const plans = await Store.list();
  const list = document.getElementById("planList");
  if(!plans.length){ list.innerHTML='<div class="empty">No saved plans yet.<br>Tap “New plan” to make your first one.</div>'; return; }
  list.innerHTML = plans.map(p=>{
    const cal = p.meals.reduce((a,m)=>a+mealTotalsOf(m)[3],0);
    const d = new Date(p.updated||Date.now());
    const date = d.toLocaleDateString(undefined,{day:"numeric",month:"short"});
    return `<div class="plan-card" onclick="openPlan('${p.id}')">
      <div>
        <div class="who">${esc(p.client)||"Untitled"}</div>
        <div class="meta">${esc(p.goal)||"—"} · ${date}</div>
      </div>
      <div style="display:flex;align-items:center;">
        <div class="kcal">${r0(cal)}<br><span style="font-size:10px;font-weight:600;color:#90a3a8">kcal</span></div>
        <button class="del" onclick="event.stopPropagation();deletePlan('${p.id}','${esc(p.client)}')">🗑</button>
      </div></div>`;
  }).join("");
}
function mealTotalsOf(m){ return m.items.reduce((a,it)=>{const f=byName[it.food],q=parseFloat(it.qty)||0;
  return f?[a[0]+f.p*q,a[1]+f.c*q,a[2]+f.fat*q,a[3]+f.cal*q]:a},[0,0,0,0]); }
function esc(s){ return (s||"").replace(/[<>&"']/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;","'":"&#39;"}[c])); }

/* ====================== VIEW SWITCH ====================== */
function show(view){
  document.getElementById("libView").classList.toggle("hidden",view!=="lib");
  document.getElementById("editView").classList.toggle("hidden",view!=="edit");
  document.getElementById("actionbar").classList.toggle("hidden",view!=="edit");
  window.scrollTo(0,0);
}
async function backToLibrary(){
  if(dirty && plan){ if(confirm("Save changes before leaving?")) await savePlan(true); }
  plan=null; dirty=false; await renderLibrary(); show("lib");
}
function newPlan(){ plan=blankPlan(); dirty=false; renderEditor(); show("edit"); }
async function openPlan(id){ const all=await Store.list(); plan=all.find(p=>p.id===id)||blankPlan(); dirty=false; renderEditor(); show("edit"); }
async function deletePlan(id,name){ if(confirm(`Delete ${name||"this plan"}? This can't be undone.`)){ await Store.remove(id); renderLibrary(); } }

/* ====================== EDITOR RENDER ====================== */
function renderEditor(){
  document.getElementById("client").value=plan.client||"";
  document.getElementById("goal").value=plan.goal||"";
  renderTargets(); renderProgress(); renderMeals();
}
function renderTargets(){
  document.getElementById("targets").innerHTML = MACROS.map((m,i)=>`
    <div class="tbox"><div class="lab">${m}</div>
      <input type="number" inputmode="numeric" min="0" value="${plan.targets[i]||""}" placeholder="0"
        oninput="setTarget(${i},this.value)"></div>`).join("");
}
function renderProgress(){
  const day=dayTotals();
  document.getElementById("progress").innerHTML = MACROS.map((m,i)=>{
    const tgt=plan.targets[i]||0, used=day[i], pct=tgt>0?Math.min(100,used/tgt*100):0;
    const over=tgt>0&&used>tgt*1.001, rem=tgt-used, u=MUNIT[i];
    const usedTxt=i===3?r0(used):r1(used), tgtTxt=tgt?(i===3?r0(tgt):r1(tgt)):"—";
    let left = !tgt?"set a target above":(over?`${i===3?r0(-rem):r1(-rem)} ${u} over`:`${i===3?r0(rem):r1(rem)} ${u} left`);
    return `<div class="pbox">
      <div class="name">${m}</div>
      <div class="used">${usedTxt}<small> / ${tgtTxt} ${u}</small></div>
      <div class="bar"><span style="width:${pct}%;background:${over?'var(--amber)':'var(--teal-2)'}"></span></div>
      <div class="left ${over?'over':''}">${left}</div></div>`;
  }).join("");
}
function renderMeals(){
  document.getElementById("meals").innerHTML = plan.meals.map((m,mi)=>{
    const rows=m.items.map((it,ri)=>{ const f=byName[it.food], mac=rowMacros(it), unit=f?f.unit:"";
      return `<div class="frow">
        <select onchange="setFood(${mi},${ri},this.value)">${foodOptions(it.food)}</select>
        <div class="qtywrap">
          <input type="number" inputmode="decimal" min="0" placeholder="qty" value="${it.qty}" oninput="setQty(${mi},${ri},this.value)">
          <span class="unit">${unit||''}</span>
        </div>
        <div class="mac" id="mac-${mi}-${ri}"><b>${r0(mac[3])}</b> kcal<br>${r1(mac[0])}p·${r1(mac[1])}c·${r1(mac[2])}f</div>
        <button class="rmrow" onclick="rmRow(${mi},${ri})">×</button></div>`;
    }).join("");
    const t=mealTotals(m);
    return `<div class="meal">
      <div class="meal-head">
        <input value="${esc(m.name)}" onchange="setMealName(${mi},this.value)">
        <button class="iconbtn" onclick="rmMeal(${mi})" title="delete meal">🗑</button></div>
      <div class="rows">${rows}<button class="add-food" onclick="addRow(${mi})">+ Add food</button></div>
      <div class="meal-sub" id="sub-${mi}"><span>${r1(t[0])}P</span><span>${r1(t[1])}C</span><span>${r1(t[2])}F</span><span>${r0(t[3])} kcal</span></div>
    </div>`;
  }).join("");
}

/* ====================== EDIT ACTIONS ====================== */
function markDirty(){ dirty=true; plan.client=document.getElementById("client").value; plan.goal=document.getElementById("goal").value; }
function setTarget(i,v){ plan.targets[i]=parseFloat(v)||0; dirty=true; renderProgress(); }
function setMealName(mi,v){ plan.meals[mi].name=v; dirty=true; }
function setFood(mi,ri,v){ plan.meals[mi].items[ri].food=v; dirty=true; renderMeals(); renderProgress(); }
function setQty(mi,ri,v){
  plan.meals[mi].items[ri].qty=v; dirty=true;
  const mac=rowMacros(plan.meals[mi].items[ri]);
  const el=document.getElementById(`mac-${mi}-${ri}`);
  if(el) el.innerHTML=`<b>${r0(mac[3])}</b> kcal<br>${r1(mac[0])}p·${r1(mac[1])}c·${r1(mac[2])}f`;
  const t=mealTotals(plan.meals[mi]);
  const sub=document.getElementById(`sub-${mi}`);
  if(sub) sub.innerHTML=`<span>${r1(t[0])}P</span><span>${r1(t[1])}C</span><span>${r1(t[2])}F</span><span>${r0(t[3])} kcal</span>`;
  renderProgress();
}
function addRow(mi){ plan.meals[mi].items.push({food:"",qty:""}); dirty=true; renderMeals(); }
function rmRow(mi,ri){ plan.meals[mi].items.splice(ri,1); if(!plan.meals[mi].items.length) plan.meals[mi].items.push({food:"",qty:""}); dirty=true; renderMeals(); renderProgress(); }
function addMeal(){ plan.meals.push({name:"Meal "+(plan.meals.length+1),items:[{food:"",qty:""}]}); dirty=true; renderMeals(); }
function rmMeal(mi){ if(plan.meals.length<=1) return toast("Keep at least one meal"); plan.meals.splice(mi,1); dirty=true; renderMeals(); renderProgress(); }

async function savePlan(silent){
  plan.client=document.getElementById("client").value.trim();
  plan.goal=document.getElementById("goal").value.trim();
  if(!plan.client){ if(!silent){ toast("Add a client name first"); document.getElementById("client").focus(); } return; }
  plan.updated=Date.now();
  const ok=await Store.save(plan); dirty=false;
  if(!silent) toast(ok?"Plan saved":"Saved locally (this session)");
}

/* ====================== PDF EXPORT ====================== */
function exportPDF(){
  const client=document.getElementById("client").value.trim()||"Client";
  const goal=document.getElementById("goal").value.trim();
  const day=dayTotals();
  const date=new Date().toLocaleDateString(undefined,{day:"numeric",month:"long",year:"numeric"});

  const mealsHTML = plan.meals.map(m=>{
    const items=m.items.filter(it=>byName[it.food]&&parseFloat(it.qty)>0);
    if(!items.length) return "";
    const t=mealTotals(m);
    const rows=items.map(it=>{ const f=byName[it.food], mc=rowMacros(it);
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 14px;border-bottom:1px solid #f0f4f4;font-size:13px;">
        <span style="flex:1">${esc(f.name)}</span>
        <span style="color:#6b8088;width:80px;text-align:right">${it.qty} ${f.unit}</span>
        <span style="font-weight:600;width:74px;text-align:right">${r0(mc[3])} kcal</span></div>`;}).join("");
    return `<div style="margin:10px 24px;border:1px solid #e1e9ea;border-radius:10px;overflow:hidden;">
      <div style="background:#1f4e5f;color:#fff;padding:8px 14px;font-weight:700;font-size:14px;">${esc(m.name)}</div>
      ${rows}
      <div style="padding:7px 14px;background:#eef3f4;font-size:12px;text-align:right;color:#1f4e5f;font-weight:600;">
        ${r1(t[0])}P · ${r1(t[1])}C · ${r1(t[2])}F · ${r0(t[3])} kcal</div></div>`;
  }).join("");

  const tgt=plan.targets;
  const tgtLine = tgt[3]>0 ? `<span style="opacity:.8">  ·  Target ${r0(tgt[3])} kcal</span>` : "";

  const html = `<div style="font-family:Arial,Helvetica,sans-serif;color:#0e2a33;width:720px;background:#fff;">
    <div style="background:#1f4e5f;color:#fff;padding:24px 24px;display:flex;justify-content:space-between;align-items:flex-end;">
      <div><div style="font-size:23px;font-weight:800;letter-spacing:.5px;">COACH MUSTAFA</div>
      <div style="font-size:11px;letter-spacing:3px;opacity:.85;margin-top:2px;">PERSONALIZED NUTRITION PLAN</div></div>
      <div style="font-size:12px;opacity:.9;">${date}</div></div>
    <div style="padding:16px 24px;border-bottom:3px solid #e8821e;">
      <div style="font-size:20px;font-weight:700;">${esc(client)}</div>
      ${goal?`<div style="display:inline-block;margin-top:7px;background:#fbe9d3;color:#9a4e0c;padding:3px 12px;border-radius:20px;font-size:12px;font-weight:600;">${esc(goal)}</div>`:""}
    </div>
    ${mealsHTML}
    <div style="margin:16px 24px 8px;background:#e8821e;color:#fff;padding:13px 16px;border-radius:10px;display:flex;justify-content:space-between;font-weight:700;font-size:15px;">
      <span>DAY TOTAL${tgtLine}</span>
      <span>${r1(day[0])}P · ${r1(day[1])}C · ${r1(day[2])}F · ${r0(day[3])} kcal</span></div>
    <div style="padding:14px 24px 22px;border-top:1px solid #e1e9ea;color:#90a3a8;font-size:11px;text-align:center;">
      Prepared by Coach Mustafa. Follow portions as listed; reach out before making changes.</div>
  </div>`;

  const node=document.createElement("div");
  node.innerHTML=html;
  const docNode=node.firstElementChild;
  const holder=document.createElement("div");
  holder.style.cssText="position:fixed;inset:0;z-index:99999;background:#fff;overflow:auto;display:flex;justify-content:center;padding:10px 0;";
  holder.appendChild(docNode);
  document.body.appendChild(holder);
  const fname=client.replace(/\s+/g,"_")+"_plan.pdf";
  const cleanup=()=>{ if(holder.parentNode) document.body.removeChild(holder); };

  if(typeof html2pdf!=="undefined"){
    setTimeout(()=>{
      html2pdf().set({margin:[18,18,18,18],filename:fname,image:{type:"jpeg",quality:0.98},
        html2canvas:{scale:2,useCORS:true,backgroundColor:"#ffffff"},
        jsPDF:{unit:"pt",format:"a4",orientation:"portrait"},
        pagebreak:{mode:["css","legacy"]}})
        .from(docNode).save()
        .then(()=>{cleanup();toast("PDF ready");})
        .catch(()=>{cleanup();printFallback(html);});
    },150);
  } else { cleanup(); printFallback(html); }
}
function printFallback(html){
  const w=window.open("","_blank");
  if(!w){ toast("Allow pop-ups to save PDF"); return; }
  w.document.write(`<html><head><title>Plan</title></head><body style="margin:0">${html}</body></html>`);
  w.document.close(); setTimeout(()=>{w.focus();w.print();},300);
}

function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1900); }

/* init */
renderLibrary();
</script>
</body>
</html>
